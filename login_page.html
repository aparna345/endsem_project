<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* BACKGROUND IMAGE */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url("loginbg.png") no-repeat center center/cover;
}

/* MAIN CONTAINER (NO BOX LOOK) */
.login-container {
    text-align: center;
    width: 350px;
}

/* LOGO */
.logo {
    width: 80px;
    margin-bottom: 15px;
}

/* TITLE */
h2 {
    font-size: 32px;
    color: #5f6654;
    margin-bottom: 5px;
}

/* SUBTEXT */
.subtext {
    font-size: 14px;
    color: #7a806c;
    font-style: italic;
    margin-bottom: 25px;
}

/* FORM */
.form-group {
    text-align: left;
    margin-bottom: 15px;
}

/* LABEL */
label {
    font-weight: 600;
    font-size: 14px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 5px;

    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(6px);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;

    background: #2a9d8f;
    color: white;
    font-weight: bold;

    margin-top: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #21867a;
}
</style>
</head>

<body>

<div class="login-container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <h2>Log In.</h2>
    <p class="subtext">for personalised experience</p>

    <form onsubmit="login(event)">
        
        <div class="form-group">
            <label>Username:</label>
            <input type="text" id="username" required>
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">Login</button>
    </form>

</div>

<script>
function login(e){
    e.preventDefault();

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234"){
        window.location.href = "main.html";
    } else {
        alert("Invalid login");
    }
}
</script>

</body>
</html>
