<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Tracker</title>

<style>
body {
    font-family: Poppins;
    background: #f5f1e9;
    padding: 20px;
}

/* SECTION CARD */
.section {
    width: 100%;
    min-height: 220px;
    margin-bottom: 20px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    padding: 20px;
    color: #2f3e2f;
}

.section::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
}

.section-content {
    position: relative;
    width: 100%;
}

h2 {
    margin-bottom: 10px;
}

/* EMOJIS */
.emojis {
    display: flex;
    justify-content: space-around;
    font-size: 28px;
    margin: 10px 0;
}

.emoji {
    cursor: pointer;
    transition: 0.3s;
}

.emoji:hover {
    transform: scale(1.3);
}

/* ACTIVE EMOJI */
.selected {
    transform: scale(1.4);
}

/* INPUT */
textarea {
    width: 100%;
    height: 70px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    padding: 8px;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    background: #2a9d8f;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* ENTRY */
.entry {
    background: rgba(255,255,255,0.9);
    padding: 6px;
    margin-top: 5px;
    border-radius: 6px;
}

/* BACKGROUNDS */
.bg1 { background: url("first-box.jpg") center/cover; }
.bg2 { background: url("second-box.jpg") center/cover; }
.bg3 { background: url("third-box.jpg") center/cover; }
.bg4 { background: url("fourth-box.jpg") center/cover; }

</style>
</head>

<body>

<!-- SECTION 1 -->
<div class="section bg1">
    <div class="section-content">
        <h2>How are you feeling today?</h2>

        <div class="emojis">
            <span class="emoji" onclick="selectMood(this,'😊 Happy')">😊</span>
            <span class="emoji" onclick="selectMood(this,'😁 Excited')">😁</span>
            <span class="emoji" onclick="selectMood(this,'😐 Neutral')">😐</span>
            <span class="emoji" onclick="selectMood(this,'😣 Sad')">😣</span>
            <span class="emoji" onclick="selectMood(this,'😭 Very Sad')">😭</span>
        </div>

        <textarea id="note" placeholder="Add a note (optional)..."></textarea>
        <button onclick="saveMood()">Save Mood</button>
    </div>
</div>

<!-- SECTION 2 -->
<div class="section bg2">
    <div class="section-content">
        <h2>Today’s Mood</h2>
        <p id="todayMood">No mood yet</p>
    </div>
</div>

<!-- SECTION 3 -->
<div class="section bg3">
    <div class="section-content">
        <h2>Mood History</h2>
        <button onclick="showHistory()">Show History</button>
        <div id="history"></div>
    </div>
</div>

<!-- SECTION 4 -->
<div class="section bg4">
    <div class="section-content">
        <h2>Mood Insights</h2>
        <button onclick="showStats()">Show Stats</button>
        <div id="stats"></div>
    </div>
</div>

<script>

let selectedMood = "";

/* SELECT MOOD */
function selectMood(el, mood){
    selectedMood = mood;

    // highlight selected emoji
    document.querySelectorAll(".emoji").forEach(e => e.classList.remove("selected"));
    el.classList.add("selected");
}

/* SAVE */
function saveMood(){
    if(selectedMood === ""){
        alert("Select a mood first!");
        return;
    }

    let note = document.getElementById("note").value;

    let data = JSON.parse(localStorage.getItem("moodData")) || [];

    let entry = {
        mood: selectedMood,
        note: note,
        date: new Date().toLocaleDateString()
    };

    data.push(entry);
    localStorage.setItem("moodData", JSON.stringify(data));

    // update UI immediately
    document.getElementById("todayMood").innerText = selectedMood;

    // clear input
    document.getElementById("note").value = "";

    alert("Mood saved!");
}

/* HISTORY */
function showHistory(){
    let data = JSON.parse(localStorage.getItem("moodData")) || [];

    let historyDiv = document.getElementById("history");
    historyDiv.innerHTML = "";

    if(data.length === 0){
        historyDiv.innerHTML = "No data yet";
        return;
    }

    data.forEach(d => {
        let div = document.createElement("div");
        div.className = "entry";
        div.innerText = `${d.date} - ${d.mood} (${d.note || "No note"})`;
        historyDiv.appendChild(div);
    });
}

/* STATS */
function showStats(){
    let data = JSON.parse(localStorage.getItem("moodData")) || [];
    let statsDiv = document.getElementById("stats");
    statsDiv.innerHTML = "";

    if(data.length === 0){
        statsDiv.innerHTML = "No stats yet";
        return;
    }

    let count = {};

    data.forEach(d => {
        count[d.mood] = (count[d.mood] || 0) + 1;
    });

    for(let mood in count){
        let div = document.createElement("div");
        div.className = "entry";
        div.innerText = `${mood}: ${count[mood]} times`;
        statsDiv.appendChild(div);
    }
}

</script>

</body>
</html>
